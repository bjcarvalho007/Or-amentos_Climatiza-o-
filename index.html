<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="B.J.C Clima">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2933/2933802.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2933/2933802.png">

    <title>Gerador de Orçamentos</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --primary: #0ea5e9;
            --secondary: #0369a1;
            --dark: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: var(--dark);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
        }

        .glass-form {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-style {
            background: #ffffff;
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .input-style:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
            outline: none;
        }

        .btn-action {
            background: linear-gradient(to right, #0ea5e9, #0284c7);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
            transition: all 0.3s ease;
        }

        .btn-action:active {
            transform: scale(0.96);
        }

        .service-card {
            animation: slideIn 0.3s ease-out;
            transition: all 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            z-index: 100;
            transition: right 0.3s ease;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }

        .history-drawer.open { right: 0; }

        .status-badge {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-pendente { background: #fef9c3; color: #854d0e; }
        .status-realizado { background: #dcfce7; color: #166534; }
        .status-desistencia { background: #fee2e2; color: #991b1b; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 150;
            padding: 1.5rem;
            align-items: center;
            justify-content: center;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100 px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 hero-gradient rounded-lg flex items-center justify-center shadow-lg">
                    <i data-lucide="snowflake" class="text-white w-5 h-5"></i>
                </div>
            </div>
            <button id="btnOpenHistory" class="relative p-2 text-slate-500 hover:text-sky-600 transition-colors flex items-center gap-2">
                <span class="text-[10px] font-bold uppercase hidden sm:block tracking-widest text-slate-400">Meus Históricos</span>
                <div class="relative">
                    <i data-lucide="history" class="w-6 h-6"></i>
                    <span id="historyBadge" class="hidden absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </div>
            </button>
        </div>
    </nav>

    <div class="hero-gradient w-full pt-6 pb-20 px-6 text-white relative overflow-hidden text-center">
        <div class="absolute top-[-50px] right-[-50px] w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
        <div class="max-w-md mx-auto relative z-10">
            <h1 class="text-2xl font-[800] tracking-tight leading-none mb-1 uppercase">GERADOR DE <span class="text-sky-200">ORÇAMENTO</span></h1>
            <p class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-80">Painel de Gerenciamento Técnico</p>
        </div>
    </div>

    <main class="max-w-md mx-auto w-full px-4 -mt-12 relative z-20 flex-grow mb-10">
        <div class="glass-form rounded-[2.5rem] p-6 shadow-xl border border-white">
            
            <form id="quoteForm" class="space-y-6">
                <!-- Dados do Cliente -->
                <div class="space-y-3">
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" id="clientName" required placeholder="Nome do cliente" 
                            class="input-style w-full px-4 py-3 rounded-2xl text-sm font-semibold text-center placeholder:text-slate-300">
                        <input type="number" id="clientPhone" required placeholder="WhatsApp (Ex: 55639...)" 
                            class="input-style w-full px-4 py-3 rounded-2xl text-sm font-semibold text-center border-sky-100 bg-sky-50/20 placeholder:text-slate-300">
                    </div>
                </div>

                <!-- Equipamento -->
                <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100 grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Modelo</label>
                        <select id="acModel" class="w-full bg-white border border-slate-200 py-2 rounded-xl text-xs font-bold text-center outline-none focus:border-sky-500">
                            <option value="Split Hi-Wall">Split Hi-Wall</option>
                            <option value="Split Inverter">Split Inverter</option>
                            <option value="Janela">Janela</option>
                            <option value="Piso Teto">Piso Teto</option>
                            <option value="Cassete">Cassete</option>
                            <option value="Multi Split">Multi Split</option>
                            <option value="Portátil">Portátil</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Potência</label>
                        <select id="acPower" class="w-full bg-white border border-slate-200 py-2 rounded-xl text-xs font-bold text-center outline-none focus:border-sky-500">
                            <option value="9.000">9k BTUs</option>
                            <option value="12.000">12k BTUs</option>
                            <option value="18.000">18k BTUs</option>
                            <option value="22.000">22k BTUs</option>
                            <option value="30.000">30k BTUs</option>
                        </select>
                    </div>
                </div>

                <!-- Secção de Serviços (Dinâmica) -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Serviços a Efetuar</h3>
                        <button type="button" id="addService" class="flex items-center gap-2 bg-sky-50 text-sky-600 px-3 py-1.5 rounded-full text-[10px] font-black uppercase hover:bg-sky-100 transition-all">
                            <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> NOVO ITEM
                        </button>
                    </div>
                    
                    <div id="servicesContainer" class="space-y-3">
                        <!-- Os itens entram aqui dinamicamente -->
                    </div>
                </div>

                <!-- Resumo e Total -->
                <div class="bg-slate-900 rounded-[2rem] p-6 text-white shadow-2xl relative overflow-hidden border border-slate-800">
                    <div class="absolute -top-4 -right-4 w-24 h-24 bg-sky-500/10 rounded-full blur-2xl"></div>
                    
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[8px] font-black uppercase tracking-[0.3em] text-sky-400">Resumo Técnico</p>
                            <h4 id="displayEquipment" class="text-xs font-bold text-slate-300">---</h4>
                        </div>
                        <i data-lucide="calculator" class="w-5 h-5 text-slate-700"></i>
                    </div>

                    <div id="liveList" class="space-y-2 mb-6 max-h-40 overflow-y-auto pr-2 custom-scrollbar"></div>
                    
                    <div class="flex justify-between items-center pt-4 border-t border-white/5">
                        <div class="space-y-0.5">
                            <p class="text-[8px] font-black uppercase tracking-widest text-slate-500">Valor Total</p>
                            <div class="text-3xl font-black text-white flex items-center gap-1">
                                <span class="text-sky-500 text-lg">R$</span>
                                <span id="displayTotal">0,00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Ações -->
                <div class="grid grid-cols-1 gap-3 pt-2">
                    <button type="button" id="btnPreview" class="w-full py-3.5 rounded-2xl border-2 border-slate-100 text-slate-400 font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-slate-50 transition-all">
                        <i data-lucide="eye" class="w-4 h-4"></i> Pré-Visualizar
                    </button>
                    <button type="submit" class="btn-action w-full py-4 rounded-[1.5rem] text-white font-black text-xs flex items-center justify-center gap-3 tracking-[0.2em] shadow-lg shadow-sky-200">
                        ENVIAR PARA WHATSAPP
                        <i data-lucide="arrow-right-circle" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Drawer de Histórico -->
    <div id="historyDrawer" class="history-drawer flex flex-col">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <div>
                <h2 class="font-black text-slate-800 uppercase tracking-tight">Meus Históricos</h2>
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Registros de Orçamentos</p>
            </div>
            <button id="btnCloseHistory" class="p-2 bg-white rounded-full shadow-sm text-slate-400 hover:text-slate-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="historyList" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 border-t bg-white">
            <button id="btnClearHistory" class="w-full py-3 text-[10px] font-black text-red-400 uppercase tracking-widest">Limpar Histórico</button>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal-overlay">
        <div class="bg-white rounded-[2rem] w-full max-w-sm overflow-hidden shadow-2xl mx-4">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Confirmação</span>
                <button type="button" id="closePreview"><i data-lucide="x" class="w-5 h-5 text-slate-300"></i></button>
            </div>
            <div class="p-6">
                <div id="previewContent" class="bg-slate-50 p-4 rounded-2xl text-[13px] whitespace-pre-wrap text-slate-700 leading-relaxed max-h-80 overflow-y-auto border border-slate-100"></div>
            </div>
            <div class="p-6 pt-0">
                <button type="button" id="confirmSend" class="w-full py-4 bg-green-500 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-green-100 flex items-center justify-center gap-2">
                    GERAR E ENVIAR <i data-lucide="check" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <footer class="py-10 text-center px-6 flex flex-col items-center">
        <p class="text-slate-400 text-[9px] uppercase tracking-[0.2em] mb-4 font-medium">© 2026 Gerenciamento Técnico</p>
        <div class="flex flex-col items-center gap-4">
            <div class="inline-flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Desenvolvido por</span>
                <span class="text-[10px] font-black text-slate-800 tracking-tighter">Dev B.J.C</span>
            </div>
            <a href="https://wa.me/5563992092699?text=Quero+um+aplicativo+como+o+de+orçamentos" target="_blank" class="text-[9px] font-black text-sky-600 uppercase tracking-[0.2em] flex items-center gap-2 border-b border-sky-100 pb-1">
                Solicitar App Próprio <i data-lucide="external-link" class="w-3 h-3"></i>
            </a>
        </div>
    </footer>

    <datalist id="servicosSugestoes">
        <!-- Manutenção e Limpeza -->
        <option value="Limpeza e Higienização Completa">
        <option value="Limpeza Preventiva (Filtros e Painel)">
        <option value="Higienização de Evaporadora">
        <option value="Limpeza de Condensadora (Unidade Externa)">
        <option value="Limpeza de Dreno e Bandeja">
        
        <!-- Instalação e Mudança -->
        <option value="Instalação Completa">
        <option value="Desinstalação de Equipamento">
        <option value="Remanejamento de Unidade">
        <option value="Pré-Instalação (Infraestrutura)">
        <option value="Passagem de Tubulação e Drenagem">
        
        <!-- Recargas e Fluídos -->
        <option value="Recarga de Gás R-22">
        <option value="Recarga de Gás R-410A">
        <option value="Carga de Gás por Balança (Peso)">
        <option value="Complemento de Carga Térmica">
        <option value="Conserto de Vazamento + Carga de Gás">
        
        <!-- Elétrica e Placas -->
        <option value="Troca de Placa Eletrônica Principal">
        <option value="Troca de Sensor de Temperatura/Degelo">
        <option value="Substituição de Capacitor de Partida">
        <option value="Reparo em Fiação Elétrica">
        <option value="Instalação de Protetor de Surto/Disjuntor">
        
        <!-- Mecânica e Motores -->
        <option value="Troca de Motor Ventilador (Evap/Cond)">
        <option value="Substituição de Compressor">
        <option value="Troca de Hélice ou Turbina">
        <option value="Substituição de Válvula de Expansão">
        <option value="Troca de Coxins e Suportes">
        
        <!-- Consultoria e Outros -->
        <option value="Visita Técnica de Diagnóstico">
        <option value="Laudo Técnico para PMOC">
        <option value="Mão de Obra Especializada">
        <option value="Troca de Isolamento Térmico">
        <option value="Acabamento em Canaleta/Fita">
    </datalist>

    <script>
        const container = document.getElementById('servicesContainer');
        const btnAdd = document.getElementById('addService');
        const displayTotal = document.getElementById('displayTotal');
        const displayEquipment = document.getElementById('displayEquipment');
        const liveList = document.getElementById('liveList');
        
        let orçamentos = JSON.parse(localStorage.getItem('bjc_orcamentos')) || [];

        // Mapeamento de ícones por palavra-chave para dinamismo
        const iconMap = {
            'limpeza': 'wind',
            'higienização': 'sparkles',
            'instalação': 'settings',
            'gás': 'cylinder',
            'vazamento': 'droplets',
            'placa': 'cpu',
            'sensor': 'thermometer',
            'capacitor': 'zap',
            'visita': 'map-pin',
            'peça': 'wrench',
            'motor': 'cog',
            'compressor': 'activity',
            'elétrica': 'bolt',
            'infraestrutura': 'drill',
            'laudo': 'file-check'
        };

        function getIconByService(text) {
            text = text.toLowerCase();
            for (let key in iconMap) {
                if (text.includes(key)) return iconMap[key];
            }
            return 'briefcase';
        }

        function createServiceRow() {
            const card = document.createElement('div');
            card.className = 'service-card bg-white border border-slate-100 p-3 rounded-2xl shadow-sm hover:border-sky-200 transition-all flex flex-col gap-3';
            card.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-sky-50 flex items-center justify-center text-sky-500 service-icon-box">
                        <i data-lucide="briefcase" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-grow">
                        <input type="text" list="servicosSugestoes" placeholder="Digite ou selecione o serviço..." 
                            class="service-desc w-full bg-transparent text-sm font-bold text-slate-700 outline-none placeholder:text-slate-300">
                    </div>
                    <button type="button" class="remove-row text-slate-300 hover:text-red-400 p-1 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="flex items-center justify-between pl-1">
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Preço do Serviço</span>
                    <div class="relative w-32">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-black text-sky-500">R$</span>
                        <input type="number" step="0.01" placeholder="0,00" 
                            class="service-price w-full pl-9 pr-4 py-2 bg-slate-50 border-none rounded-xl text-xs font-black text-slate-700 text-right focus:ring-2 focus:ring-sky-100 outline-none">
                    </div>
                </div>
            `;
            
            container.appendChild(card);
            lucide.createIcons();

            const descInput = card.querySelector('.service-desc');
            const priceInput = card.querySelector('.service-price');
            const iconBox = card.querySelector('.service-icon-box');

            descInput.focus();

            descInput.oninput = () => {
                const iconName = getIconByService(descInput.value);
                iconBox.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i>`;
                lucide.createIcons();
                updateOrder();
            };
            
            priceInput.oninput = updateOrder;
            card.querySelector('.remove-row').onclick = () => { card.remove(); updateOrder(); };
        }

        function updateOrder() {
            let total = 0;
            let listHtml = "";
            displayEquipment.innerText = `${document.getElementById('acModel').value} - ${document.getElementById('acPower').value} BTUs`;
            
            const rows = document.querySelectorAll('.service-card');
            rows.forEach((row) => {
                const desc = row.querySelector('.service-desc').value || "";
                const price = parseFloat(row.querySelector('.service-price').value) || 0;
                total += price;
                if(desc) {
                    listHtml += `
                        <div class="flex justify-between items-center py-1.5 border-b border-white/5 group">
                            <div class="flex items-center gap-2 truncate pr-4">
                                <div class="w-1 h-1 rounded-full bg-sky-500"></div>
                                <span class="text-[11px] text-slate-400 font-medium truncate">${desc}</span>
                            </div>
                            <span class="font-black text-sky-400 text-[11px] shrink-0">R$ ${price.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                        </div>`;
                }
            });
            liveList.innerHTML = listHtml || '<p class="text-[10px] text-slate-700 italic opacity-50 text-center">Nenhum serviço listado ainda...</p>';
            displayTotal.innerText = total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        function generateProfessionalMessage() {
            const cliente = document.getElementById('clientName').value || "Cliente";
            const modelo = document.getElementById('acModel').value;
            const potencia = document.getElementById('acPower').value;
            const rows = document.querySelectorAll('.service-card');
            let servicosTexto = "";
            let total = 0;

            rows.forEach(row => {
                const d = row.querySelector('.service-desc').value;
                const p = parseFloat(row.querySelector('.service-price').value) || 0;
                if(d) {
                    total += p;
                    servicosTexto += `• *${d}*\n  └─ R$ ${p.toLocaleString('pt-BR', {minimumFractionDigits: 2})}\n\n`;
                }
            });

            return `❄️ *ORÇAMENTO TÉCNICO*\n━━━━━━━━━━━━━━━━━━\n\nOlá, *${cliente}*!\nSeguem os detalhes para o serviço de climatização:\n\n📍 *EQUIPAMENTO:* \n↳ ${modelo} (${potencia} BTUs)\n\n🛠 *SERVIÇOS PROPOSTOS:*\n${servicosTexto}━━━━━━━━━━━━━━━━━━\n💰 *VALOR TOTAL:* \n👉 *R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}*\n\n*Aguardo a sua confirmação para agendarmos o atendimento!*`;
        }

        const btnOpenHistory = document.getElementById('btnOpenHistory');
        const btnCloseHistory = document.getElementById('btnCloseHistory');
        const historyDrawer = document.getElementById('historyDrawer');
        const previewModal = document.getElementById('previewModal');

        btnOpenHistory.onclick = () => { renderHistory(); historyDrawer.classList.add('open'); };
        btnCloseHistory.onclick = () => historyDrawer.classList.remove('open');
        
        document.getElementById('btnPreview').onclick = () => {
            document.getElementById('previewContent').innerText = generateProfessionalMessage();
            previewModal.style.display = 'flex';
        };
        
        document.getElementById('closePreview').onclick = () => previewModal.style.display = 'none';

        document.getElementById('confirmSend').onclick = () => {
            const msg = generateProfessionalMessage();
            const data = {
                id: Date.now(),
                cliente: document.getElementById('clientName').value,
                telefone: document.getElementById('clientPhone').value,
                total: displayTotal.innerText,
                status: 'pendente',
                mensagem: msg,
                data: new Date().toLocaleDateString('pt-BR')
            };
            orçamentos.unshift(data);
            localStorage.setItem('bjc_orcamentos', JSON.stringify(orçamentos));
            previewModal.style.display = 'none';
            window.location.href = `https://wa.me/${data.telefone}?text=${encodeURIComponent(msg)}`;
        };

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = orçamentos.length ? "" : "<p class='text-center py-10 opacity-30 text-xs font-black uppercase'>Sem Registros</p>";
            orçamentos.forEach(o => {
                const item = document.createElement('div');
                item.className = "bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-2";
                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] font-black text-slate-800 uppercase">${o.cliente}</span>
                        <span class="status-badge status-${o.status}">${o.status}</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-xs font-black text-sky-600">R$ ${o.total}</span>
                        <span class="text-[8px] font-bold text-slate-400">${o.data}</span>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        btnAdd.onclick = createServiceRow;
        document.getElementById('acModel').onchange = updateOrder;
        document.getElementById('acPower').onchange = updateOrder;
        
        window.onload = () => {
            createServiceRow();
            lucide.createIcons();
            renderHistory();
        };
    </script>
</body>
</html>
